# Recipe: Qwen3-Coder-Next-FP8
# Qwen3-Coder-Next model in native FP8 format


recipe_version: "1"
name: Qwen3-Coder-Next-FP8
description: vLLM serving Qwen3-Coder-Next-FP8

# HuggingFace model to download (optional, for --download-model)
model: Qwen/Qwen3-Coder-Next-FP8

#solo_only: true

# Container image to use
container: vllm-node

# Mod required to fix slowness and crash in the cluster (tracking https://github.com/vllm-project/vllm/issues/33857)
mods:
  - mods/gpu-mem-util-gb
  - mods/fix-qwen3-coder-next

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization_gb: 85  # ~90GB of 128GB per node; was 0.7 (≈89.6GB)
  max_model_len: 131072

# Environment variables
env: {}

# The vLLM serve command template
command: |
  vllm serve /models/Qwen3-Coder-Next-FP8 \
    --served-model-name qwen3-coder-next-fp8 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --gpu-memory-utilization-gb {gpu_memory_utilization_gb} \
    --host {host} \
    --port {port} \
    --kv-cache-dtype fp8 \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --max-model-len {max_model_len} \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray

