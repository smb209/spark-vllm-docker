# Recipe: Qwen3-VL-Embedding-8B
# Multimodal embedding model — text, images, screenshots, video
# Runs alongside an LLM on the same node (low memory footprint ~15GB BF16)

recipe_version: "1"
name: Qwen3-VL-Embedding-8B
description: vLLM pooling server for Qwen3-VL-Embedding-8B (text + multimodal)

model: Qwen/Qwen3-VL-Embedding-8B

container: vllm-node
container_name: vllm-embedding

solo_only: true  # embedding servers don't benefit from tensor parallelism

mods:
  - mods/drop-caches

defaults:
  port: 8001       # offset from LLM port so both can run on same Spark
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.16   # ~20GB — model is 15.48GB + CUDA graphs
  max_model_len: 8192

env:
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"

command: |
  vllm serve /models/Qwen3-VL-Embedding-8B \
    --served-model-name qwen3-vl-embedding \
    --runner pooling \
    --trust-remote-code \
    --gpu-memory-utilization {gpu_memory_utilization} \
    -tp {tensor_parallel} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --load-format safetensors \
    --limit-mm-per-prompt image=1 \
    --limit-mm-per-prompt video=0
