# Recipe: Qwen3.5-122B-A10B-FP8
# Qwen3.5-122B model in native FP8 quantization with MTP speculative decoding

recipe_version: "1"
name: Qwen3.5-122B-FP8-MTP
description: vLLM serving Qwen3.5-122B-FP8 with MTP speculative decoding (latency-optimized)

model: Qwen/Qwen3.5-122B-A10B-FP8

cluster_only: true

container: vllm-node

mods:
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.82
  max_model_len: 131072
  max_num_batched_tokens: 8192

env:
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 1
  NCCL_IB_HCA: rocep1s0f0
  NCCL_IB_GID_INDEX: "3"
  NCCL_IB_USE_WRITE: "1"
  NCCL_IB_MTU: "4096"
  NCCL_NET_GDR_LEVEL: "5"
  NCCL_DEBUG: INFO
  VLLM_MOE_BACKEND: DEEPGEMM

command: |
  vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
    --served-model-name qwen3.5-122b \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} --distributed-executor-backend ray \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --speculative-config '{{"method": "mtp", "num_speculative_tokens": 1}}' \
    --generation-config vllm \
    --override-generation-config '{{"temperature": 1.0, "top_p": 0.95, "top_k": 20, "presence_penalty": 1.5}}'
