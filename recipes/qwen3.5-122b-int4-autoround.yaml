# Recipe: Qwen3.5-122B-A10B-INT4-Autoround
# Qwen3.5-122B model in Intel INT4-Autoround quantization
# Single-Spark tp=1 — proven 28 tok/s, frees Spark-2 for other tasks

recipe_version: "1"
name: Qwen3.5-122B-INT4-Autoround
description: vLLM serving Qwen3.5-122B-INT4-Autoround (single Spark, Marlin backend)

model: Intel/Qwen3.5-122B-A10B-int4-AutoRound

container: vllm-node-tf5

build_args:
  - --tf5

mods:
  - mods/drop-caches
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_batched_tokens: 8192

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  TRANSFORMERS_OFFLINE: "1"
  HF_DATASETS_OFFLINE: "1"

command: |
  vllm serve /models/Qwen3.5-122B-A10B-int4-AutoRound \
    --served-model-name qwen3.5-122b \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --generation-config vllm \
    --attention-config.backend flashinfer \
    --override-generation-config '{{"temperature": 1.0, "top_p": 0.95, "top_k": 20, "presence_penalty": 1.5}}' \
    --speculative-config '{{"method": "mtp", "num_speculative_tokens": 1}}' \
    -tp {tensor_parallel}


# Removed --enforce-eager