# Recipe: Qwen3.5-122B-A10B-PrismaQuant
# Qwen3.5-122B model in PrismaQuant Quantization

recipe_version: "1"
name: Qwen3.5-122B-A10B-PrismaQuant
description: vLLM serving Qwen3.5-122B-A10B-PrismaQuant (single Spark)

model: rdtand/Qwen3.5-122B-A10B-PrismaQuant-4.75bit-vllm

container: vllm-node

mods:
  - mods/drop-caches
  - mods/fix-qwen3.5-chat-template-enhanced
  - mods/gpu-mem-util-gb

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization_gb: 96
  max_model_len: 131072
  max_num_batched_tokens: 4096

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  VLLM_USE_FLASHINFER_NVFP4: "1"
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  TRANSFORMERS_OFFLINE: "1"
  HF_DATASETS_OFFLINE: "1"

command: |
  vllm serve /models/rdtand-Qwen3.5-122B-A10B-PrismaQuant-4.75bit-vllm \
    --served-model-name qwen3.5-122b-prisma \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization-gb {gpu_memory_utilization_gb} \
    --port {port} \
    --host {host} \
    --load-format instanttensor \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template qwen3.5-enhanced.jinja \
    --override-generation-config '{{"temperature": 1.0, "top_p": 0.95, "top_k": 20, "presence_penalty": 1.5}}' \
    --speculative-config '{{"method": "mtp", "num_speculative_tokens": 1}}' \
    -tp {tensor_parallel}


# Removed --enforce-eager